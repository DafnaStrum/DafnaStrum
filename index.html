<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>דפנה שטרום - סוכנת ביטוח פנסיוני</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  direction: rtl;
}

/* 🔥 וואטסאפ מקצועי */
.whatsapp-container {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 9999;
}

/* טקסט */
.whatsapp-text {
  background: white;
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* כפתור */
.whatsapp-button {
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  animation: pulse 2s infinite;
}

/* אייקון */
.whatsapp-button img {
  width: 35px;
  height: 35px;
}

/* אנימציה */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* HEADER */
.header {
  background: #1f3c88;
  color: white;
  text-align: center;
  padding: 20px;
}

.hero-img {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  background: linear-gradient(to bottom, #1f3c88, #0f1f4d);
  border-radius: 12px;
  margin-bottom: 20px;
}

/* תוכן */
.section {
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: white;
  margin: 20px auto;
  padding: 20px;
  max-width: 600px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- 🚀 וואטסאפ מתקדם -->
<a href="https://wa.me/972546111718?text=היי%20דפנה,%20אשמח%20לקבל%20פרטים">
  <div class="whatsapp-container">

    <div class="whatsapp-text">
      דברי איתי
    </div>

    <div class="whatsapp-button">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
    </div>

  </div>
</a>

<div class="header">
  <img src="DAFNA.jpeg" class="hero-img">
  <h1>דפנה שטרום</h1>
  <p>סוכנת ביטוח פנסיוני</p>
</div>

<div class="section">
  <div class="card">
    <h2>קצת עליי</h2>
    <p>
    סוכנת ביטוח פנסיוני עם ניסיון של 15 שנה, מתמחה בהתאמה אישית של פתרונות ביטוח ופנסיה.
    </p>
  </div>
</div>

</body>
</html>
