<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>דפנה שטרום | סוכנת ביטוח פנסיוני</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { 
  font-family: Arial; 
  margin: 0; 
  background: #f4f6f8; 
  direction: rtl; 
  scroll-behavior: smooth;
  padding-top: 70px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #1e2a38;
  padding: 10px 0;
  z-index: 1000;
}
.navbar ul {
  list-style: none;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  flex-wrap: wrap;
}
.navbar li { margin: 0 15px; }
.navbar a { color: white; text-decoration: none; font-weight: bold; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #2b4c9a, #3f6ad8);
  color: white;
  padding: 40px 20px 20px;
  text-align: center;
}
.header img {
  width: 60%;
  max-width: 320px;
  border-radius: 50%;
  margin-top: 10px;
  border: 4px solid white;
}

/* CONTENT */
.section { padding: 40px 20px; text-align: center; }

.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  max-width: 650px;
  border-radius: 15px;
  text-align: right;
}

/* BUTTON */
.button2 {
  background: #2b4c9a;
  color: white;
  padding: 16px 40px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 18px;
  display: block;
  width: fit-content;
  margin: 20px auto;
  border: none;
  cursor: pointer;
}

/* FORM */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* FLOAT BUTTONS */
.floating-container {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: flex;
  gap: 12px;
}
.whatsapp-float {
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 30px;
}
.mail-float {
  background: #EA4335;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
}
</style>
</head>

<body>

<div class="floating-container">
  <a href="https://wa.me/972546111718" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>
  <a href="mailto:Dafna.Insurance@gmail.com" class="mail-float">
    <i class="fas fa-envelope"></i>
  </a>
</div>

<nav class="navbar">
  <ul>
    <li><a href="#home">בית</a></li>
    <li><a href="#about">אודות</a></li>
    <li><a href="#contact">צור קשר</a></li>
  </ul>
</nav>

<div id="home" class="header">
  <h1>דפנה שטרום</h1>
  <h2>סוכנת ביטוח פנסיוני</h2>
  <img src="https://dafnastrum.github.io/DafnaStrum/DAFNA.jpeg">
</div>

<div class="section">

  <div id="about" class="card">
    <h2>אודות</h2>
    <p>סוכנת ביטוח פנסיוני עם ניסיון של 15 שנה בליווי אישי.</p>
  </div>

  <div id="contact" class="card">
    <h2>צור קשר</h2>

    <form class="contact-form" onsubmit="sendMail(event)">
      
      <input type="text" id="firstName" placeholder="שם פרטי" required>
      <input type="text" id="lastName" placeholder="שם משפחה" required>

      <select id="product" required>
        <option value="">בחר מוצר ביטוחי</option>
        <option>פנסיה</option>
        <option>קופת גמל</option>
        <option>ביטוח מנהלים</option>
        <option>ביטוח חיים</option>
        <option>ביטוח נסיעות לחו״ל</option>
      </select>

      <input type="email" id="email" placeholder="אימייל">
      <input type="tel" id="phone" placeholder="טלפון נייד" required>

      <textarea id="help" placeholder="איך אפשר לעזור?"></textarea>

      <button type="submit" class="button2">שלח</button>

    </form>
  </div>

</div>

<script>
function sendMail(e) {
  e.preventDefault();

  let firstName = document.getElementById("firstName").value;
  let lastName = document.getElementById("lastName").value;
  let product = document.getElementById("product").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let help = document.getElementById("help").value;

  let body =
    `שם פרטי: ${firstName}%0D%0A` +
    `שם משפחה: ${lastName}%0D%0A` +
    `מוצר ביטוחי: ${product}%0D%0A` +
    `טלפון: ${phone}%0D%0A` +
    `אימייל: ${email}%0D%0A` +
    `איך אפשר לעזור: ${help}`;

  window.location.href = `mailto:Dafna.Insurance@gmail.com?subject=פנייה חדשה מהאתר&body=${body}`;
}
</script>

</body>
</html>
