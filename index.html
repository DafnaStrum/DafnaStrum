<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>דפנה שטרום | סוכנת ביטוח פנסיוני</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { font-family: Arial; margin: 0; background: #f4f6f8; direction: rtl; scroll-behavior: smooth; }

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #1e2a38;
  padding: 10px 0;
  z-index: 1000;
}

/* 🔥 הפתרון – רווח מהתפריט */
.header {
  margin-top: 60px; /* גובה התפריט */
  background: linear-gradient(135deg, #2b4c9a, #3f6ad8);
  color: white;
  padding: 40px 20px;
  text-align: center;
}

.navbar ul {
  list-style: none;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  flex-wrap: wrap;
}

.navbar li { margin: 0 15px; }
.navbar a { color: white; text-decoration: none; font-weight: bold; }

/* CONTENT */
.section { padding: 40px 20px; }
.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  max-width: 650px;
  border-radius: 15px;
  text-align: right;
}

/* SCROLL FIX */
[id] { scroll-margin-top: 80px; }

/* MOBILE */
@media (max-width: 600px) {

  .navbar ul { flex-direction: column; }

  .header {
    margin-top: 90px; /* 🔥 יותר מקום בנייד */
  }

  [id] {
    scroll-margin-top: 120px;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <ul>
    <li><a href="#home">בית</a></li>
    <li><a href="#about">אודות</a></li>
    <li><a href="#services">שירותים</a></li>
    <li><a href="#contact">צור קשר</a></li>
  </ul>
</nav>

<div id="home" class="header">
  <h1>דפנה שטרום</h1>
  <h2>סוכנת ביטוח פנסיוני</h2>
</div>

<div class="section">
  <div id="about" class="card">
    <h2>אודות</h2>
    <p>ניסיון של 15 שנה בליווי פיננסי וביטוחי.</p>
  </div>
</div>

</body>
</html>
