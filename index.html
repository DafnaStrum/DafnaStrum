<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>דפנה שטרום | סוכנת ביטוח פנסיוני ברמת ישי</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body { 
  font-family: Arial; 
  margin: 0; 
  background: #f4f6f8; 
  direction: rtl; 
  scroll-behavior: smooth;
  padding-top: 70px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #1e2a38;
  padding: 10px 0;
  z-index: 1000;
}

.navbar ul {
  list-style: none;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  flex-wrap: wrap;
}

.navbar li { margin: 0 15px; }
.navbar a { color: white; text-decoration: none; font-weight: bold; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #2b4c9a, #3f6ad8);
  color: white;
  padding: 40px 20px 20px;
  text-align: center;
}

.header h1 {
  font-size: 38px;
  margin: 20px 0 5px 0; /* הורדה למטה כדי למנוע חיתוך */
}

.header h2 {
  font-size: 22px;
  margin: 0 0 5px 0;
}

.header img {
  width: 60%;
  max-width: 384px;
  border-radius: 50%;
  margin-top: 10px;
  border: 4px solid white;
}

/* SECTION */
.section { padding: 40px 20px; text-align: center; }

.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  max-width: 650px;
  border-radius: 15px;
  text-align: right;
}

/* SERVICES */
.services-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
}

.services-text { flex: 1; }

.services-banner iframe {
  width: 250px;
  height: 250px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* BUTTON */
.button2 {
  background: #2b4c9a;
  color: white;
  padding: 16px 40px;
  border-radius: 12px;
  font-size: 18px;
  display: block;
  width: fit-content;
  margin: 20px auto;
  border: none;
  cursor: pointer;
}

/* FORM */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.contact-form input,
.contact-form textarea,
.contact-form select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  width: 100%;
  box-sizing: border-box;
}

/* FLOATING ICONS */
.floating-container {
  position: fixed;
  top: 60%;
  left: 20px;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 9999;
}

.whatsapp-float {
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.mail-float {
  background: #EA4335;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  text-decoration: none;
}

/* FIX ANCHOR */
[id] { scroll-margin-top: 90px; }

/* MOBILE FIXES */
@media (max-width: 600px) {

  .navbar ul { flex-direction: column; }
  body { padding-top: 110px; }

  /* HEADER FIX */
  .header {
    padding: 15px 20px 10px; /* פחות רווח למעלה */
  }

  .header h1 {
    font-size: 36px;
    margin-top: 0;
    margin-bottom: 5px;
  }

  .header h2 {
    font-size: 21px;
    margin-top: 0;
  }

  .header img {
    width: 72%;
    margin-top: 5px;
  }

  /* ABOUT SECTION MOVED UP */
  #about {
    margin-top: -10px; /* מעלה את הסיפור */
  }

  .services-card {
    flex-direction: column;
    text-align: center;
  }

  .services-banner {
    order: -1;
  }

  .services-banner iframe {
    width: 100%;
    max-width: 300px;
  }

  .floating-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    top: auto;
    transform: none;
    flex-direction: row;
  }

  [id] {
    scroll-margin-top: 140px;
  }
}
</style>
</head>

<body>

<div class="floating-container">

    <li><a href="#mistakes">טעויות נפוצות</a></li>
    <li><a href="#contact">צור קשר</a></li>
  </ul>
</nav>

<div id="home" class="header">
  <h1>דפנה שטרום</h1>
  <h2>סוכנת ביטוח פנסיוני</h2>

</div>

    <p>

    </p>
  </div>

</div>

</html>
