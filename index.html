<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { 
  font-family: Arial; 
  margin: 0; 
  background: #f4f6f8; 
  direction: rtl; 
  padding-top: 70px;

/* FLOATING ICONS */

/* דסקטופ - באמצע המסך */
.floating-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 9999;
}

.whatsapp-float {
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.mail-float {
  background: #EA4335;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  text-decoration: none;
}

/* מובייל - כמו שהיה במקור */
@media (max-width: 600px) {
  .floating-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    top: auto;
    transform: none;
    flex-direction: row;
  }
}

</style>
