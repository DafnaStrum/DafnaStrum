<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>דפנה שטרום | סוכנת ביטוח פנסיוני</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { 
  font-family: Arial; 
  margin: 0; 
  background: #f4f6f8; 
  direction: rtl; 
  scroll-behavior: smooth;
  padding-top: 70px;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #1e2a38;
  padding: 10px 0;
}

.navbar ul {
  list-style: none;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  flex-wrap: wrap;
}

.navbar li { margin: 0 15px; }

.navbar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.header {
  background: linear-gradient(135deg, #2b4c9a, #3f6ad8);
  color: white;
  padding: 40px;
  text-align: center;
}

.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  max-width: 650px;
  border-radius: 15px;
}

/* FORM */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.contact-form input,
.contact-form textarea,
.contact-form select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.button2 {
  background: #2b4c9a;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.button2:hover {
  background: #1f3f85;
}
</style>
</head>

<body>

<nav class="navbar">
  <ul>
    <li><a href="#home">בית</a></li>
    <li><a href="#contact">צור קשר</a></li>
  </ul>
</nav>

<div id="home" class="header">
  <h1>דפנה שטרום</h1>
  <h2>סוכנת ביטוח פנסיוני</h2>
</div>

<div class="card" id="contact">
  <h2>צור קשר</h2>

  <!-- FORMSPREE FORM -->
  <form class="contact-form"
        action="https://formspree.io/f/mojyzqgv"
        method="POST">

    <input type="text" name="firstName" placeholder="שם פרטי" required>

    <input type="text" name="lastName" placeholder="שם משפחה" required>

    <select name="product" required>
      <option value="">בחר מוצר ביטוחי</option>
      <option>פנסיה</option>
      <option>קופת גמל</option>
      <option>ביטוח מנהלים</option>
      <option>ביטוח חיים</option>
      <option>ביטוח נסיעות לחו״ל</option>
    </select>

    <input type="email" name="email" placeholder="אימייל">

    <input type="tel" name="phone" placeholder="טלפון נייד" required>

    <textarea name="help" placeholder="איך אפשר לעזור?"></textarea>

    <button type="submit" class="button2">שלח פרטים</button>

  </form>
</div>

</body>
</html>
