<style>
body { 
  font-family: Arial; 
  margin: 0; 
  background: #f4f6f8; 
  direction: rtl; 
  scroll-behavior: smooth;

  /* ⭐ תיקון קריטי למניעת חיתוך */
  padding-top: 95px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #1e2a38;
  padding: 12px 0;
  z-index: 1000;
}

.navbar ul {
  list-style: none;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  flex-wrap: wrap;
}

.navbar li { margin: 0 15px; }

.navbar a { color: white; text-decoration: none; font-weight: bold; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #2b4c9a, #3f6ad8);
  color: white;
  text-align: center;

  /* ⭐ חשוב: דחיפה פנימית למניעת חיתוך */
  padding: 55px 20px 20px;
}

.header h1 {
  font-size: 38px;
  margin: 0 0 5px 0;
  line-height: 1.2; /* מונע חיתוך אופקי/אנכי */
}

.header h2 {
  font-size: 22px;
  margin: 0 0 10px 0;
}

.header img {
  width: 60%;
  max-width: 384px;
  border-radius: 50%;
  margin-top: 10px;
  border: 4px solid white;
}

/* SECTION */
.section { 
  padding: 30px 20px; 
  text-align: center; 
}

.card {
  background: white;
  margin: 15px auto;
  padding: 22px 25px;
  max-width: 650px;
  border-radius: 15px;
  text-align: right;
}

/* FLOATING ICONS */
.floating-container {
  position: fixed;
  top: 60%;
  left: 20px;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 9999;
}

.whatsapp-float {
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.mail-float {
  background: #EA4335;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  text-decoration: none;
}

/* FIX ANCHORS */
[id] { scroll-margin-top: 100px; }

/* MOBILE */
@media (max-width: 600px) {

  body {
    padding-top: 130px; /* ⭐ קריטי למובייל */
  }

  .header {
    padding: 70px 15px 15px; /* מונע חיתוך גם במובייל */
  }

  .header h1 {
    font-size: 32px;
  }

  .header h2 {
    font-size: 20px;
  }

  .header img {
    width: 72%;
  }

  .floating-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    top: auto;
    transform: none;
    flex-direction: row;
  }

  [id] { scroll-margin-top: 150px; }
}
</style>
</head>

<div class="floating-container">
